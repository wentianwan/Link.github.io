<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>文天玩WenTianPlay | 版权友链</title><style>*{margin:0;padding:0;box-sizing:border-box}body{height:128px;display:flex;justify-content:center;align-items:center;font-family:"Microsoft YaHei",sans-serif;font-size:12px;background-color:#f8f9fa;overflow:hidden}.container{width:100%;max-width:1200px;text-align:center;padding:0 10px}.row{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:2px 0;line-height:1.2}.link{display:inline-block;margin:0 8px}a{color:#0066cc;text-decoration:none;transition:color 0.2s}a:hover{color:#ff6600;text-decoration:underline}.copyright{color:#666}.info{color:#333}</style></head><body><div class="container" id="content"></div><script>function l(){fetch('https://api.wentianplay.com/api/link.json').then(r=>{if(!r.ok)throw new Error('文天玩');return r.json()}).then(d=>{const c=document.getElementById('content');c.innerHTML='';for(let i=1;i<=5;i++){const r=document.createElement('div');r.className='row';r.id=`row-${i}`;c.appendChild(r)}document.getElementById('row-1').innerHTML=`<span class="copyright">${d.copyright}</span>`;document.getElementById('row-2').innerHTML=`<span class="info">${d.records.join('  ')}</span>`;const ln=d.links,rs=[ln.slice(0,4),ln.slice(4,9),ln.slice(9,13)];for(let i=0;i<3;i++){const re=document.getElementById(`row-${i+3}`);rs[i].forEach(l=>{const ls=document.createElement('span');ls.className='link';ls.innerHTML=`<a href="${l.url}" target="_blank" title="${l.name}">${l.name}</a>`;re.appendChild(ls)})}}).catch(e=>{console.error('版权所有:',e);document.getElementById('content').innerHTML='<div class="row">WenTianPlay</div>'})}l();setInterval(l,13000);</script></body></html>
