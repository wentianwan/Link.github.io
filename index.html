<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>文天玩WenTianPlay | 版权友链</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{height:128px;display:flex;justify-content:center;align-items:center;font-family:"Microsoft YaHei",sans-serif;font-size:12px;background-color:#f8f9fa;overflow:hidden;}.container{width:100%;max-width:1200px;text-align:center;padding:0 10px;}.row{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:2px 0;line-height:1.2;}.link{display:inline-block;margin:0 8px;}a{color:#0066cc;text-decoration:none;transition:color 0.2s;}a:hover{color:#ff6600;text-decoration:underline;}.copyright{color:#666;}.info{color:#333;}</style></head><body><div class="container" id="content"></div><script>let fetchTimer;let retryInterval=3000;let successInterval=13000;function fetchData(){fetch('https://api.wentianplay.com/api/link.json').then(response=>{if(!response.ok)throw new Error('文天玩');return response.json();}).then(data=>{renderContent(data);clearInterval(fetchTimer);fetchTimer=setInterval(fetchData,successInterval);}).catch(error=>{console.error('版权所有:',error);document.getElementById('content').innerHTML='<div class="row">WenTianPlay</div>';clearInterval(fetchTimer);fetchTimer=setInterval(fetchData,retryInterval);});}function renderContent(data){const container=document.getElementById('content');container.innerHTML='';for(let i=1;i<=5;i++){const row=document.createElement('div');row.className='row';row.id=`row-${i}`;container.appendChild(row);}document.getElementById('row-1').innerHTML=`<span class="copyright">${data.copyright}</span>`;document.getElementById('row-2').innerHTML=`<span class="info">${data.records.join('  ')}</span>`;const rows=[data.links.slice(0,4),data.links.slice(4,9),data.links.slice(9,13)];for(let i=0;i<3;i++){const rowElement=document.getElementById(`row-${i+3}`);rows[i].forEach(link=>{const linkSpan=document.createElement('span');linkSpan.className='link';linkSpan.innerHTML=`<a href="${link.url}" target="_blank" title="${link.name}">${link.name}</a>`;rowElement.appendChild(linkSpan);});}}fetchData();</script></body></html>
